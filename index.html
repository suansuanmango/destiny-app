<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命運好好玩 — 東方系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F9F5EF;
  --card: #FFFFFF;
  --primary: #6B4C3B;
  --accent: #C0855A;
  --light: #EDE5D8;
  --text: #2D1F17;
  --muted: #7A6355;
  --good: #2D6A4F;
  --good-bg: #EAF5EE;
  --bad: #A33;
  --bad-bg: #FFF0F0;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 16px 60px;
}

header {
  text-align: center;
  margin-bottom: 32px;
}
header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  color: var(--primary);
  letter-spacing: 0.05em;
}
header p {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 6px;
}

.container { max-width: 640px; margin: 0 auto; }

/* ── 輸入表單 ── */
.form-card {
  background: var(--card);
  border-radius: 16px;
  padding: 28px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 24px;
}
.form-card h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  color: var(--primary);
  margin-bottom: 20px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.form-group.full { grid-column: 1 / -1; }
label {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
input, select {
  border: 1.5px solid #DDD;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--bg);
  font-family: inherit;
  transition: border-color 0.2s;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
.radio-group {
  display: flex;
  gap: 16px;
  padding-top: 4px;
}
.radio-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
  color: var(--text);
  cursor: pointer;
}
.hint {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
}
.btn {
  width: 100%;
  margin-top: 20px;
  padding: 13px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #5a3c2c; }

/* ── 結果區域 ── */
#result { display: none; }

.result-section {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  color: var(--primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title span { font-size: 1.1rem; }

/* 四柱 */
.pillars {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.pillar-card {
  background: var(--light);
  border-radius: 10px;
  padding: 14px 8px;
  text-align: center;
}
.pillar-label {
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 8px;
}
.pillar-chars {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.1em;
}
.correction-note {
  margin-top: 12px;
  font-size: 0.76rem;
  color: var(--muted);
  background: var(--bg);
  padding: 8px 12px;
  border-radius: 8px;
  line-height: 1.6;
}

/* 命卦 */
.trigram-display {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
}
.trigram-big {
  font-family: 'Noto Serif TC', serif;
  font-size: 3rem;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
  width: 64px;
  text-align: center;
}
.trigram-info h3 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.2rem;
  color: var(--primary);
}
.trigram-info p {
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 4px;
}
.category-badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-top: 6px;
}
.east { background: #E3F2FD; color: #1565C0; }
.west { background: #FFF3E0; color: #E65100; }

/* 八方位 */
.directions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.dir-item {
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.dir-item.good { background: var(--good-bg); }
.dir-item.bad { background: var(--bad-bg); }
.dir-item.neutral { background: var(--light); }
.dir-star {
  font-size: 0.88rem;
  font-weight: 600;
}
.dir-item.good .dir-star { color: var(--good); }
.dir-item.bad .dir-star { color: var(--bad); }
.dir-item.neutral .dir-star { color: var(--primary); }
.dir-info {
  text-align: right;
  font-size: 0.82rem;
  color: var(--muted);
}
.dir-trigram {
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
  font-size: 1rem;
  color: var(--text);
}

/* 農曆 */
.lunar-display {
  font-size: 0.88rem;
  color: var(--muted);
  background: var(--bg);
  padding: 10px 14px;
  border-radius: 8px;
}

/* 錯誤 */
.error-box {
  background: var(--bad-bg);
  color: var(--bad);
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.88rem;
  margin-top: 12px;
  display: none;
}

/* ── 命盤摘要卡片 ── */
.summary-card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 12px;
}
.summary-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.summary-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
}
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.summary-item {
  background: var(--light);
  border-radius: 10px;
  padding: 12px 14px;
}
.summary-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
.summary-value { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 700; color: var(--primary); }
.lucky-section { border-top: 1px solid var(--light); padding-top: 16px; }
.lucky-title { font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.05em; }
.lucky-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.lucky-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg); border-radius: 20px;
  padding: 5px 12px; font-size: 0.82rem; color: var(--text);
}
.lucky-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── 折疊詳解 ── */
.detail-section {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  margin-bottom: 10px;
  overflow: hidden;
}
.detail-summary {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px; cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem; font-weight: 600; color: var(--primary);
  list-style: none; user-select: none;
}
.detail-summary::-webkit-details-marker { display: none; }
.detail-summary::after {
  content: '›'; margin-left: auto;
  font-size: 1.3rem; color: var(--muted); transition: transform 0.2s;
}
details[open] .detail-summary::after { transform: rotate(90deg); }
.detail-body { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 20px; }
.detail-sub-title {
  font-size: 0.72rem; font-weight: 600; color: var(--muted);
  margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase;
}

/* ── AI 分析 ── */
.ai-content {
  font-size: 0.9rem; line-height: 1.8; color: var(--text);
}
.ai-section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem; font-weight: 700;
  color: var(--primary); margin: 16px 0 6px;
}
.ai-section-title:first-child { margin-top: 0; }
.ai-bullet {
  padding-left: 14px; position: relative; margin: 4px 0;
}
.ai-bullet::before {
  content: '·'; position: absolute; left: 0;
  color: var(--accent); font-weight: 700;
}
.btn-secondary {
  width: 100%; padding: 13px;
  background: transparent; color: var(--primary);
  border: 1.5px solid var(--primary);
  border-radius: 10px; font-size: 1rem;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: 0.05em; cursor: pointer;
  transition: all 0.2s; margin-top: 12px;
}
.btn-secondary:hover { background: var(--primary); color: #fff; }
.btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── 東方靈數數字 ── */
.eastern-nums { display: flex; flex-direction: column; gap: 16px; }
.nums-section-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; }
.nums-section-label.good { color: var(--good); }
.nums-section-label.bad  { color: var(--bad); }
.nums-row { display: flex; flex-wrap: wrap; gap: 8px; }
.num-badge {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 14px; border-radius: 10px; min-width: 52px;
}
.num-badge.good { background: var(--good-bg); }
.num-badge.bad  { background: var(--bad-bg); }
.num-badge-val { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; font-weight: 700; }
.num-badge.good .num-badge-val { color: var(--good); }
.num-badge.bad  .num-badge-val { color: var(--bad); }
.num-badge-star { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

/* ── 人類圖 ── */
.hd-display { display: flex; flex-direction: column; gap: 14px; }
.hd-profile-card {
  background: linear-gradient(135deg, #f8f3ec, #ede5d8);
  border-radius: 14px; padding: 20px; text-align: center;
}
.hd-profile-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 3rem; font-weight: 700; color: var(--primary);
  letter-spacing: 0.2em; line-height: 1;
}
.hd-profile-zh {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem; color: var(--accent); margin: 8px 0 4px;
}
.hd-profile-key { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
.hd-gates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.hd-gate-item { background: var(--light); border-radius: 10px; padding: 12px 14px; }
.hd-gate-type { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
.hd-gate-val { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 700; color: var(--primary); }
.hd-gate-line { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.hd-note { font-size: 0.76rem; color: var(--muted); background: var(--bg); border-radius: 8px; padding: 10px 12px; line-height: 1.6; }

/* ── 生命靈數 ── */
.nums-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.num-card { background: var(--light); border-radius: 10px; padding: 14px 8px; text-align: center; }
.num-value { font-family: 'Noto Serif TC', serif; font-size: 2rem; font-weight: 700; color: var(--primary); }
.num-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
/* ── 星座 & 生肖 ── */
.zodiac-row { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--light); }
.zodiac-row:last-child { border-bottom: none; }
.zodiac-symbol { font-size: 2rem; width: 44px; text-align: center; flex-shrink: 0; }
.zodiac-name { font-family: 'Noto Serif TC', serif; font-size: 1.05rem; font-weight: 600; color: var(--primary); }
.zodiac-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
/* ── 吠陀 ── */
.nakshatra-display { background: var(--light); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.nakshatra-name { font-family: 'Noto Serif TC', serif; font-size: 1.05rem; font-weight: 700; color: var(--primary); }
.nakshatra-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; line-height: 1.6; }
.dasha-list { display: flex; flex-direction: column; gap: 6px; }
.dasha-item {
  display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
  padding: 8px 12px; border-radius: 8px; background: var(--light); font-size: 0.84rem;
}
.dasha-item.active { background: #EAF5EE; border-left: 3px solid var(--good); }
.dasha-item.past { opacity: 0.45; }
.dasha-planet { font-weight: 600; color: var(--primary); }
.dasha-period { color: var(--muted); font-size: 0.76rem; text-align: right; }

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .pillars { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .pillar-chars { font-size: 1.2rem; }
  .directions-grid { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>命運好好玩</h1>
    <p>東方系統 Demo — 八字四柱 × 八宅命卦</p>
  </header>

  <!-- 輸入表單 -->
  <div class="form-card">
    <h2>輸入出生資料</h2>
    <div class="form-grid">

      <div class="form-group">
        <label>出生年</label>
        <input type="number" id="year" value="1990" min="1900" max="2099">
      </div>
      <div class="form-group">
        <label>出生月</label>
        <input type="number" id="month" value="7" min="1" max="12">
      </div>
      <div class="form-group">
        <label>出生日</label>
        <input type="number" id="day" value="23" min="1" max="31">
      </div>
      <div class="form-group">
        <label>出生時（24小時制）</label>
        <input type="number" id="hour" value="12" min="0" max="23">
      </div>
      <div class="form-group">
        <label>出生分</label>
        <input type="number" id="minute" value="0" min="0" max="59">
      </div>
      <div class="form-group">
        <label>出生地</label>
        <select id="longitude">
          <option value="121.74">基隆市</option>
          <option value="121.55">台北市</option>
          <option value="121.45">新北市</option>
          <option value="121.30">桃園市</option>
          <option value="120.97">新竹市</option>
          <option value="121.00">新竹縣</option>
          <option value="120.82">苗栗縣</option>
          <option value="120.68" selected>台中市</option>
          <option value="120.54">彰化縣</option>
          <option value="120.68">南投縣</option>
          <option value="120.54">雲林縣</option>
          <option value="120.45">嘉義市</option>
          <option value="120.57">嘉義縣</option>
          <option value="120.20">台南市</option>
          <option value="120.32">高雄市</option>
          <option value="120.49">屏東縣</option>
          <option value="121.15">台東縣</option>
          <option value="121.60">花蓮縣</option>
          <option value="121.75">宜蘭縣</option>
          <option value="119.57">澎湖縣</option>
          <option value="118.32">金門縣</option>
          <option value="119.96">連江縣（馬祖）</option>
        </select>
      </div>

      <div class="form-group full">
        <label>性別</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="male" checked> 男</label>
          <label><input type="radio" name="gender" value="female"> 女</label>
        </div>
      </div>

    </div>
    <button class="btn" onclick="calculate()">計算命盤</button>
    <div class="error-box" id="error"></div>
  </div>

  <!-- 結果 -->
  <div id="result">

    <!-- 命盤摘要 -->
    <div class="summary-card">
      <div class="summary-title">命運總覽</div>
      <div class="summary-name">你的命盤摘要</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="summary-label">太陽星座</div><div class="summary-value" id="sumSun">—</div></div>
        <div class="summary-item"><div class="summary-label">月亮星座</div><div class="summary-value" id="sumMoon">—</div></div>
        <div class="summary-item"><div class="summary-label">生命靈數</div><div class="summary-value" id="sumLifePath">—</div></div>
        <div class="summary-item"><div class="summary-label">生肖</div><div class="summary-value" id="sumAnimal">—</div></div>
        <div class="summary-item"><div class="summary-label">命卦</div><div class="summary-value" id="sumTrigram">—</div></div>
        <div class="summary-item"><div class="summary-label">月宿</div><div class="summary-value" id="sumNakshatra">—</div></div>
      </div>
      <div class="lucky-section">
        <div class="lucky-title">✦ 幸運提示</div>
        <div class="lucky-chips" id="luckyChips"></div>
      </div>
    </div>

    <!-- 折疊：東方命理 -->
    <details class="detail-section">
      <summary class="detail-summary"><span>☯</span> 東方命理</summary>
      <div class="detail-body">
        <div>
          <div class="detail-sub-title">八字四柱</div>
          <div class="pillars">
            <div class="pillar-card"><div class="pillar-label">年柱</div><div class="pillar-chars" id="yearPillar">—</div></div>
            <div class="pillar-card"><div class="pillar-label">月柱</div><div class="pillar-chars" id="monthPillar">—</div></div>
            <div class="pillar-card"><div class="pillar-label">日柱</div><div class="pillar-chars" id="dayPillar">—</div></div>
            <div class="pillar-card"><div class="pillar-label">時柱</div><div class="pillar-chars" id="hourPillar">—</div></div>
          </div>
          <div class="correction-note" id="correctionNote"></div>
        </div>
        <div>
          <div class="detail-sub-title">農曆</div>
          <div class="lunar-display" id="lunarDate"></div>
        </div>
        <div>
          <div class="detail-sub-title">八宅命卦</div>
          <div class="trigram-display">
            <div class="trigram-big" id="trigramChar">—</div>
            <div class="trigram-info">
              <h3 id="trigramName">—</h3>
              <p id="trigramDetail"></p>
              <span class="category-badge" id="trigramCategory"></span>
            </div>
          </div>
        </div>
        <div>
          <div class="detail-sub-title">八方位吉凶</div>
          <div class="directions-grid" id="directionsGrid"></div>
        </div>
        <div>
          <div class="detail-sub-title">東方靈數 — 幸運數字</div>
          <div id="easternNumsInfo"></div>
        </div>
      </div>
    </details>

    <!-- 折疊：西洋星座 & 吠陀占星 -->
    <details class="detail-section">
      <summary class="detail-summary"><span>⭐</span> 西洋星座 & 吠陀占星</summary>
      <div class="detail-body">
        <div>
          <div class="detail-sub-title">西洋星座 & 生肖</div>
          <div id="zodiacInfo"></div>
        </div>
        <div>
          <div class="detail-sub-title">吠陀占星（Jyotish）</div>
          <div id="vedicInfo"></div>
        </div>
      </div>
    </details>

    <!-- 折疊：生命靈數 -->
    <details class="detail-section">

// ── 工具：Julian Day Number（純 JS，替代 sweph.julday）──
function julday(year, month, day, hour) {
  const Y = month <= 2 ? year - 1 : year;
  const M = month <= 2 ? month + 12 : month;
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + day + hour / 24 + B - 1524.5;
}

// ── 工具：均時差近似公式（純 JS，替代 sweph.time_equ，誤差 <1 分鐘）──
function equationOfTimeMinutes(year, month, day) {
  // 計算該日是年內第幾天
  const start = new Date(year, 0, 1);
  const date = new Date(year, month - 1, day);
  const dayOfYear = Math.round((date - start) / 86400000) + 1;
  const B = (360 / 365) * (dayOfYear - 81) * (Math.PI / 180);
  return 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
}

];

function isTaiwanDst(year, month, day) {
  const p = TAIWAN_DST_PERIODS.find(p => p[0] === year);
  if (!p) return false;
  const v = month * 100 + day;
  return v >= p[1] * 100 + p[2] && v <= p[3] * 100 + p[4];

function calculateBaZi({ year, month, day, hour, minute, longitude, utcOffset = 8 }) {
  const isDst = isTaiwanDst(year, month, day);
  const clockHour = hour + minute / 60 - (isDst ? 1 : 0);
  const standardMeridian = utcOffset * 15;
  const longitudeCorrection = (longitude - standardMeridian) * 4; // 分鐘
  const eot = equationOfTimeMinutes(year, month, day); // 分鐘
  const totalCorrection = longitudeCorrection + eot;
  const correctedTotal = clockHour * 60 + totalCorrection;

  let correctedHour = Math.floor(correctedTotal / 60) % 24;
  if (correctedHour < 0) correctedHour += 24;
  let correctedMinute = Math.round(correctedTotal % 60);
  if (correctedMinute < 0) correctedMinute += 60;

  const solar = Solar.fromYmdHms(year, month, day, correctedHour, correctedMinute, 0);
  const lunar = solar.getLunar();
  const bazi = lunar.getBaZi();

  return {
    yearPillar: bazi[0], monthPillar: bazi[1], dayPillar: bazi[2], hourPillar: bazi[3],
    lunarDate: lunar.toString(),

    longitudeCorrection: longitudeCorrection.toFixed(1),

// ── 月亮黃道位置（Meeus 近似 + Lahiri Ayanamsa）──
function getMoonLongitudes(year, month, day, hour) {
  const JD = julday(year, month, day, hour);
  const T = (JD - 2451545.0) / 36525.0;
  const r = Math.PI / 180;
  const L0 = 218.3164477 + 481267.88123421 * T;
  const M  = 134.9633964 + 477198.8675055  * T;
  const D  = 297.8501921 + 445267.1114034  * T;
  const Ms = 357.5291092 + 35999.0502909   * T;
  const F  = 93.2720950  + 483202.0175233  * T;
  const dL = 6288774*Math.sin(M*r) + 1274027*Math.sin((2*D-M)*r)
    + 658314*Math.sin(2*D*r) + 213618*Math.sin(2*M*r)
    - 185116*Math.sin(Ms*r)  - 114332*Math.sin(2*F*r)
    + 58793*Math.sin((2*D-2*M)*r) + 57066*Math.sin((2*D-Ms-M)*r)
    + 53322*Math.sin((2*D+M)*r)   + 45758*Math.sin((2*D-Ms)*r);
  const tropical = ((L0 + dL / 1e6) % 360 + 360) % 360;
  const ayanamsa = 23.85 + (year - 2000) * 0.01397;
  return { tropical, sidereal: (tropical - ayanamsa + 360) % 360 };
}

  const F = (JD + 0.5) - Z;
  const alpha = Math.floor((Z - 1867216.25) / 36524.25);
  const A = Z >= 2299161 ? Z + 1 + alpha - Math.floor(alpha / 4) : Z;
  const B = A + 1524;
  const C = Math.floor((B - 122.1) / 365.25);
  const D = Math.floor(365.25 * C);
  const E = Math.floor((B - D) / 30.6001);
  const day = B - D - Math.floor(30.6001 * E);
  const month = E < 14 ? E - 1 : E - 13;
  const year = month > 2 ? C - 4716 : C - 4715;
  return { year, month, day, hour: F * 24 };
}

function getHDGateAndLine(sunLon) {
  const gateWidth = 360 / 64;
  const lon = ((sunLon % 360) + 360) % 360;
  const pos = Math.floor(lon / gateWidth) % 64;
  const gate = HD_GATES[pos];
  const posInGate = (lon - pos * gateWidth) / gateWidth;
  const line = Math.min(6, Math.floor(posInGate * 6) + 1);
  return { gate, line };
}

function calcHumanDesign(year, month, day, hour, minute) {
  const persHour = hour + minute / 60;
  const persSunLon = getSunLongitude(year, month, day, persHour);
  const persSun = getHDGateAndLine(persSunLon);

  // Design = 太陽退後 88°（binary search，覆蓋夏令/冬令速度差異）
  const targetLon = (persSunLon - 88 + 360) % 360;
  const birthJD = julday(year, month, day, persHour);
  let lo = birthJD - 110, hi = birthJD - 75;
  for (let i = 0; i < 40; i++) {
    const mid = (lo + hi) / 2;
    const dt = jdToDate(mid);
    let diff = getSunLongitude(dt.year, dt.month, dt.day, dt.hour) - targetLon;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    if (diff > 0) hi = mid; else lo = mid;
  }
  const desDate = jdToDate((lo + hi) / 2);
  const desSunLon = getSunLongitude(desDate.year, desDate.month, desDate.day, desDate.hour);
  const desSun = getHDGateAndLine(desSunLon);

  const profileKey = `${persSun.line}/${desSun.line}`;
  const profile = HD_PROFILES[profileKey] || { zh: '特殊組合', key: '請至完整人類圖工具查詢' };
  return { persSun, desSun, profileKey, profile };
}
